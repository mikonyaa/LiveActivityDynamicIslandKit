name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEMO_PROJECT: Examples/LiveActivityDemo/LiveActivityDemo.xcodeproj
  DEMO_SCHEME: LiveActivityDemo
  DEMO_DESTINATION: "generic/platform=iOS Simulator"
  XCODEGEN_VERSION: "2.45.4"

jobs:
  fast:
    name: PR · current
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Ensure SwiftLint
        run: command -v swiftlint >/dev/null || brew install swiftlint
      - name: Test package
        run: swift test
      - name: Lint
        run: swiftlint lint --strict
      - name: Build demo
        run: |
          xcodebuild \
            -project "$DEMO_PROJECT" \
            -scheme "$DEMO_SCHEME" \
            -destination "$DEMO_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build

  full:
    name: Full · ${{ matrix.name }}
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: compatibility
            runner: macos-15
            developer_dir: /Applications/Xcode_16.4.app/Contents/Developer
          - name: current
            runner: macos-26
            developer_dir: /Applications/Xcode_26.5.app/Contents/Developer
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure SwiftLint
        run: command -v swiftlint >/dev/null || brew install swiftlint
      - name: Test package
        run: swift test
      - name: Lint
        run: swiftlint lint --strict
      - name: Build demo
        run: |
          xcodebuild \
            -project "$DEMO_PROJECT" \
            -scheme "$DEMO_SCHEME" \
            -destination "$DEMO_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Install pinned XcodeGen
        if: matrix.name == 'current'
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" \
            --output "$RUNNER_TEMP/xcodegen.zip"
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
      - name: Reproduce checked-in project
        if: matrix.name == 'current'
        run: |
          test "$(xcodegen --version | awk '{print $2}')" = "$XCODEGEN_VERSION"
          demo_dir="$(dirname "$DEMO_PROJECT")"
          (
            cd "$demo_dir"
            xcodegen generate
          )
          git diff --exit-code -- "$DEMO_PROJECT/project.pbxproj"
      - name: Check documentation links
        if: matrix.name == 'current'
        run: |
          ruby -e 'Dir["**/*.md"].each { |file| File.read(file).scan(/\[[^\]]*\]\(([^)]+)\)/).flatten.each { |link| next if link.start_with?("http", "#", "mailto:"); path = link.split("#", 2).first.delete_prefix("<").delete_suffix(">"); next if path.empty?; abort("Missing #{path} from #{file}") unless File.exist?(File.expand_path(path, File.dirname(file))) } }'
      - name: Scan publication artifacts
        if: matrix.name == 'current'
        run: |
          if git grep -nEi 'codex|chatgpt|claude|ai assistant|generated by' -- . ':!*.pbxproj' ':!.github/workflows/*.yml' ':!.github/workflows/*.yaml'; then
            exit 1
          fi
